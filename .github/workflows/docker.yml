# Build and push the animelisterr Docker image to GitHub Container
# Registry on every push to master. The resulting image is available at
#
#   ghcr.io/abs3ntdev/animelisterr:latest
#   ghcr.io/abs3ntdev/animelisterr:master-<short-sha>
#
# which is what the Unraid template pulls. Auth uses the repo's built-in
# GITHUB_TOKEN — no secrets to configure.

name: docker

on:
  push:
    branches: [master]
  workflow_dispatch:

# Prevent overlapping builds on rapid pushes; keep the newest commit only.
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute image tags. `latest` tracks the tip of master;
      # `master-<sha>` is an immutable tag you can pin Unraid to if you
      # want deterministic deploys instead of always-latest pulls.
      - name: Compute image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/animelisterr
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=master-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache makes incremental rebuilds ~30s instead
          # of several minutes; mode=max includes intermediate layers.
          cache-from: type=gha
          cache-to: type=gha,mode=max
